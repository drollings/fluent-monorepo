[package]
name = "guidance"
version.workspace = true
edition.workspace = true

[dependencies]
common-core = { path = "../../common-core" }
guidance-core = { path = "../../guidance" }
guidance-search-vector = { path = "../../search-vector" }
guidance-llm = { path = "../../llm" }
guidance-content-node = { path = "../../content-node" }
guidance-types = { path = "../../types" }
fluent-concurrency = { path = "../../fluent-concurrency" }
clap = { workspace = true, features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "macros"] }
tracing = { workspace = true }
bon = { workspace = true }
thiserror = { workspace = true }
blake3 = { workspace = true }
notify = { workspace = true }
tracing-subscriber = "0.3"
time = { workspace = true, features = ["formatting", "parsing"] }
ptree = "0.5"

[dev-dependencies]
tempfile = { workspace = true }
